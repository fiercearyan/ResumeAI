<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Mock Greenhouse — Senior Backend Engineer</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 32px auto; padding: 24px; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .sub { color: #666; margin-bottom: 24px; }
    label { display: block; font-size: 14px; margin-top: 14px; color: #333; }
    input, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    button { margin-top: 24px; padding: 10px 20px; background: #1f3a8a; color: white; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
    .thanks { display: none; padding: 18px; background: #ecfdf5; border: 1px solid #34d399; border-radius: 6px; color: #065f46; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Senior Backend Engineer</h1>
  <p class="sub">ExampleCo · San Francisco / Remote · Greenhouse (mock)</p>

  <form id="apply_form" onsubmit="onSubmit(event)">
    <div class="row">
      <div>
        <label for="first_name">First name</label>
        <input id="first_name" name="first_name" required />
      </div>
      <div>
        <label for="last_name">Last name</label>
        <input id="last_name" name="last_name" required />
      </div>
    </div>

    <label for="email">Email</label>
    <input id="email" name="email" type="email" required />

    <label for="phone">Phone</label>
    <input id="phone" name="phone" />

    <label for="resume">Resume</label>
    <div id="resume_fieldset"><input id="resume" name="resume" type="file" accept=".pdf,.docx,.tex" required /></div>

    <label for="lk">LinkedIn</label>
    <input id="lk" name="linkedin" />

    <label for="gh">GitHub</label>
    <input id="gh" name="github" />

    <label for="city">City</label>
    <input id="city" name="city" />

    <button id="submit_app" type="submit">Submit application</button>
  </form>

  <div id="confirmation" class="thanks">Thank you for applying — we received your application.</div>

  <script>
    function onSubmit(e) {
      e.preventDefault();
      document.getElementById('apply_form').style.display = 'none';
      document.getElementById('confirmation').style.display = 'block';
    }
  </script>
</body>
</html>
